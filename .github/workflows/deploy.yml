name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Generate Wrangler types
        run: npm run cf-typegen
        continue-on-error: true
      
      - name: Build project
        run: npm run build
      
      - name: Check FTP secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ] || [ -z "${{ secrets.FTP_USERNAME }}" ] || [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "⚠️ Secrets FTP não configurados. Pulando deploy."
            echo "Para configurar, adicione os seguintes secrets no GitHub:"
            echo "  - FTP_SERVER"
            echo "  - FTP_USERNAME"
            echo "  - FTP_PASSWORD"
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Secrets FTP configurados."
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Deploy to Hostinger via FTP
        if: steps.check-secrets.outputs.skip_deploy != 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/client/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

